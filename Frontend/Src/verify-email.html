<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email - Admin Assist</title>
  <link rel="stylesheet" href="login.css">
  <style>
    .verify-panel {
      text-align: center;
    }

    .verify-status {
      margin: 1rem 0 1.4rem;
      padding: 0.9rem 1rem;
      border-radius: 8px;
      background: #f3f6fb;
      color: #25324a;
      line-height: 1.5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60px;
      gap: 0.8rem;
    }

    .verify-status.success {
      background: #eaf7ef;
      color: #17633a;
    }

    .verify-status.error {
      background: #fdecec;
      color: #9f1d1d;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .verify-actions {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .verify-link {
      color: #0f4c81;
      font-weight: 700;
      text-decoration: none;
    }

    .countdown {
      font-size: 0.85em;
      margin-top: 0.5rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="login-container verify-panel">
    <div class="login-header">
      <div class="login-logo">AA</div>
      <h1>Email Verification</h1>
      <p>Activating your Admin Assist account</p>
    </div>

    <div id="verifyStatus" class="verify-status">
      <div class="spinner"></div>
      <span>Checking your verification link...</span>
    </div>

    <div class="verify-actions">
      <a class="login-btn" href="login.html">Go to Login</a>
      <a class="verify-link" href="signup.html">Create another account</a>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    async function verifyEmail() {
      const status = document.getElementById("verifyStatus");
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");
      const email = params.get("email");

      if (!token || !email) {
        status.innerHTML = "<span>❌ This verification link is missing required details or has expired.</span>";
        status.className = "verify-status error";
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/auth/verify-email`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, token }),
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Email verification failed");

        // Success! Show message and auto-redirect
        status.innerHTML = "<span>✅ Email verified successfully!</span>";
        status.className = "verify-status success";
        
        let countdown = 3;
        const countdownDiv = document.createElement("div");
        countdownDiv.className = "countdown";
        countdownDiv.textContent = `Redirecting to login in ${countdown} seconds...`;
        status.appendChild(countdownDiv);
        
        const interval = setInterval(() => {
          countdown--;
          if (countdown <= 0) {
            clearInterval(interval);
            window.location.href = "login.html";
          } else {
            countdownDiv.textContent = `Redirecting to login in ${countdown} seconds...`;
          }
        }, 1000);
        
      } catch (err) {
        status.innerHTML = `<span>❌ ${err.message}<br><small style="display: block; margin-top: 0.5rem;">Please check the link or <a href="login.html" style="color: inherit; text-decoration: underline;">return to login</a> to resend verification.</small></span>`;
        status.className = "verify-status error";
      }
    }

    verifyEmail();
  </script>
</body>
</html>
