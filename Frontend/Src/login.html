<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Admin Assist</title>
  <link rel="stylesheet" href="login.css">
</head>

<body>
  <div class="login-container">
    <div class="login-header">
      <div class="login-logo">AA</div>
      <h1>Welcome Back!</h1>
      <p>Sign in to your Admin Assist account</p>
    </div>

    <div id="error-banner" class="error-banner" role="alert" aria-live="polite"></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password" placeholder="Enter your password" required
            autocomplete="current-password">
          <button type="button" class="toggle-pw" aria-label="Show password" id="togglePw">👁</button>
        </div>
      </div>

      <div class="remember-forgot">
        <label>
          <input type="checkbox" name="remember"> Remember Me
        </label>
        <a href="#">Forgot Password?</a>
      </div>

      <button type="submit" class="login-btn" id="loginBtn">Login</button>
    </form>

    <div class="signup-link">
      <!-- FIX: was "Frontend/Src/signup.html" — both files are in the same folder -->
      <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
    </div>
  </div>

  <script src="auth.js"></script>
  <script src="login.js"></script>
</body>

</html>
