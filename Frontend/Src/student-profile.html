<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Profile - Admin Assist</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="students.css">
</head>

<body>
  <header>
    <div class="logo">Admin Assist</div>
    <div class="user-profile">
      <span id="headerUserName">…</span>
      <span id="roleBadge" class="role-badge"></span>
      <div class="user-avatar" id="headerAvatar">?</div>
      <button id="logoutBtn">Logout</button>
    </div>
  </header>

  <div class="main-container">
    <div class="breadcrumb">
      <a href="dashboard.html">Dashboard</a> > <a href="students.html">Student Directory</a> > <span>Student
        Profile</span>
    </div>

    <h1 style="font-family: 'Playfair Display', serif; font-size: 32px; margin-bottom: 32px;">Student Profile</h1>

    <!-- PROFILE HEADER -->
    <div class="profile-header">
      <!-- Left Column -->
      <div class="profile-card">
        <!-- Populated by JavaScript -->
      </div>

      <!-- Right Column -->
      <div>
        <!-- TABS -->
        <div class="tabs">
          <button class="tab active">Personal Info</button>
          <button class="tab">Attendance</button>
          <button class="tab">Academic Records</button>
        </div>

        <!-- TAB CONTENTS -->
        <div class="tab-content active">
          <!-- Populated by JavaScript -->
        </div>

        <div class="tab-content">
          <div class="tab-placeholder">
            <div class="tab-placeholder-icon">📅</div>
            <p>Attendance data will appear here.</p>
          </div>
        </div>

        <div class="tab-content">
          <div class="tab-placeholder">
            <div class="tab-placeholder-icon">📊</div>
            <p>Academic records will appear here.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="auth.js"></script>
  <!-- <script src="auth-guard.js"></script>-->
  <script src="students.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      requireAuth();
      const user = getUser();
      if (user) {
        const firstName = user.name ? user.name.split(" ")[0] : "User";
        document.getElementById("headerUserName").textContent = user.name || "User";
        document.getElementById("headerAvatar").textContent = firstName.charAt(0).toUpperCase();
        document.getElementById("roleBadge").textContent = user.role ? user.role.charAt(0).toUpperCase() + user.role.slice(1) : "User";
      }

      document.getElementById("logoutBtn").addEventListener("click", async () => {
        try {
          await authFetch(`${API_BASE}/auth/logout`, { method: "POST" });
        } catch { }
        finally {
          clearSession();
          window.location.href = "login.html";
        }
      });

      initializeStudentProfile();
    });
  </script>
</body>

</html>
