<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Profile - Admin Assist</title>
  <meta name="description" content="View full student profile in Admin Assist school management.">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="students.css">
</head>

<body>
  <header>
    <div class="logo">Admin Assist</div>
    <div class="user-profile">
      <span id="headerUserName" data-user-name>…</span>
      <span id="roleBadge" class="role-badge" data-user-role></span>
      <div class="user-avatar" id="headerAvatar" data-user-initials>?</div>
      <button id="logoutBtn">Logout</button>
    </div>
  </header>

  <div class="main-container">
    <div class="breadcrumb">
      <a href="dashboard.html">Dashboard</a> &gt; <a href="students.html">Student Directory</a> &gt; <span>Student Profile</span>
    </div>

    <!-- Page toolbar — styled via students.css .page-header, no inline styles -->
    <div class="page-header">
      <h1 class="page-title">Student Profile</h1>
    </div>

    <!-- PROFILE LAYOUT -->
    <div class="profile-header">

      <!-- Left Column — populated by students.js renderProfileHeader() -->
      <div class="profile-card" id="profileCard">
        <!-- Populated by JavaScript -->
      </div>

      <!-- Right Column — tabs -->
      <div class="profile-tabs-wrapper">

        <!-- TAB BAR -->
        <div class="tabs" role="tablist">
          <button class="tab active" role="tab" aria-selected="true"  aria-controls="tabPersonal"  id="tabBtnPersonal">Personal Info</button>
          <button class="tab"        role="tab" aria-selected="false" aria-controls="tabAttendance" id="tabBtnAttendance">Attendance</button>
          <button class="tab"        role="tab" aria-selected="false" aria-controls="tabAcademic"   id="tabBtnAcademic">Academic Records</button>
        </div>

        <!-- TAB PANELS -->
        <div class="tab-content active" id="tabPersonal" role="tabpanel" aria-labelledby="tabBtnPersonal">
          <!-- Populated by JavaScript from API data -->
        </div>

        <div class="tab-content" id="tabAttendance" role="tabpanel" aria-labelledby="tabBtnAttendance">
          <div class="tab-placeholder">
            <div class="tab-placeholder-icon">📅</div>
            <p>Attendance data will appear here.</p>
          </div>
          <!-- SPRINT 3: populate attendance table here -->
        </div>

        <div class="tab-content" id="tabAcademic" role="tabpanel" aria-labelledby="tabBtnAcademic">
          <div class="tab-placeholder">
            <div class="tab-placeholder-icon">📊</div>
            <p>Academic records will appear here.</p>
          </div>
          <!-- SPRINT 4: populate academic records table here -->
        </div>

      </div>
    </div>
  </div>

  <!-- External scripts only — no inline logic -->
  <script src="auth.js" defer></script>
  <script src="auth-guard.js" defer></script>
  <script src="students.js" defer></script>
  <script src="student-profile-page.js" defer></script>
</body>

</html>
