<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Admin Assist</title>
  <link rel="stylesheet" href="signup.css">
</head>

<body>
  <div class="signup-container">
    <div class="signup-header">
      <div class="signup-logo">AA</div>
      <h1>Create Your Account</h1>
      <p>Join the Admin Assist workspace</p>
    </div>

    <!-- NEW: Error / success banner -->
    <div id="form-banner" class="form-banner" role="alert" aria-live="polite"></div>

    <form id="signupForm" novalidate>
      <div class="form-group">
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required
          autocomplete="name">
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required autocomplete="email">
      </div>

      <div class="form-group">
        <label for="role">Role</label>
        <select id="role" name="role" required>
          <option value="staff" selected>Staff</option>
          <option value="user">User</option>
          <option value="headmaster">Headmaster</option>
          <option value="admin">Admin</option>
        </select>
      </div>

      <div class="form-group">
        <label for="password">Create Password</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password" placeholder="At least 8 characters" minlength="8"
            required autocomplete="new-password">
          <button type="button" class="toggle-pw" id="togglePw" aria-label="Show password">👁</button>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <div class="input-wrap">
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat your password"
            minlength="8" required autocomplete="new-password">
        </div>
      </div>

      <button type="submit" class="signup-btn" id="signupBtn">Sign Up</button>
    </form>

    <div class="login-link">
      <p>Already have an account? <a href="login.html">Login</a></p>
    </div>
  </div>

  <script src="auth.js"></script>
  <script src="signup.js"></script>
</body>

</html>
