<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Transcript | Admin Assist</title>
    <link rel="stylesheet" href="theme.css" />
    <link rel="stylesheet" href="navigation.css" />
    <link rel="stylesheet" href="slide-panels.css" />
    <link rel="stylesheet" href="aa-shared.css" />
    <link rel="stylesheet" href="s-transcript.css" />
</head>

<body data-page="student-transcript">
    <div id="navigation-root"></div>

    <main class="aa-main">
        <header class="aa-page-header">
            <div>
                <p class="aa-kicker">Academics</p>
                <h1>Student Transcript</h1>
                <p class="aa-subtitle">View a student's full academic record grouped by term.</p>
            </div>
            <div class="aa-header-actions">
                <button class="aa-btn aa-btn-secondary" id="printBtn" type="button">🖨 Print</button>
                <a class="aa-btn aa-btn-secondary" href="academic-records.html">← Records</a>
            </div>
        </header>

        <!-- Search / filter -->
        <section class="aa-filter-bar">
            <div class="aa-filter-field" style="flex:2">
                <label for="studentSearch">Student Name or Admission No</label>
                <input type="text" id="studentSearch" placeholder="Type to search…" autocomplete="off" />
            </div>
            <div class="aa-filter-field">
                <label for="yearFilter">Academic Year</label>
                <select id="yearFilter">
                    <option value="">All Years</option>
                </select>
            </div>
        </section>

        <!-- Search suggestions -->
        <div id="suggestions" style="display:none; position:relative; margin-top:-1rem; margin-bottom:1rem;">
            <div id="suggestionsList"
                style="background:var(--aa-white); border:1px solid var(--aa-border); border-radius:var(--aa-radius); box-shadow:var(--aa-shadow-md); max-height:220px; overflow-y:auto;">
            </div>
        </div>

        <!-- Transcript output -->
        <section class="aa-card" id="transcriptCard" hidden>
            <!-- Injected dynamically by JS -->
        </section>

        <!-- Placeholder -->
        <div class="aa-empty-state" id="placeholderState">
            <h3>Search for a student</h3>
            <p>Enter a name or admission number above to pull up their transcript.</p>
        </div>
    </main>

    <script src="auth.js"></script>
    <script src="auth-guard.js"></script>
    <script src="navigation.js"></script>
    <script src="student-transcript.js"></script>
</body>

</html>
